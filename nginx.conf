events {}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Require auth for everything by default
    auth_basic "CE Tracker – Authorized Users Only";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
      try_files $uri $uri/ =404;
    }

    # We'll add /logout in Item 4 below
  }
}
