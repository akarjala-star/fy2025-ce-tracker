events {}

http {
  # Critical: correct Content-Type for JS/CSS so the app runs and styles load
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Protect everything (simple + secure)
    auth_basic "CE Tracker – Authorized Users Only";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Prevent stale HTML/JS/CSS during active development
    location = /index.html {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      try_files $uri =404;
    }

    location ~* \.(js|css)$ {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      try_files $uri =404;
    }

    # Cache only true static binary assets
    location ~* \.(png|jpg|jpeg|gif|svg|ico|woff2?)$ {
      add_header Cache-Control "public, max-age=31536000, immutable" always;
      try_files $uri =404;
    }

    # “Logout” for Basic Auth (forces re-auth)
    location = /logout {
      add_header WWW-Authenticate 'Basic realm="CE Tracker – Logged Out"' always;
      return 401;
    }

    # Health endpoint
    location = /health {
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # Default routing
    location / {
      try_files $uri $uri/ =404;
    }
  }
}
