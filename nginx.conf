events {}

http {
  # Ensure correct Content-Type headers for .js/.css/etc.
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ----------------------------
    # Allow static assets to load without auth (prevents module chain issues)
    # ----------------------------

    # JS/CSS should NOT be aggressively cached while iterating
    location ~* \.(js|css)$ {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      try_files $uri =404;
    }

    # Cache true binary assets safely
    location ~* \.(png|jpg|jpeg|gif|svg|ico|woff2?)$ {
      add_header Cache-Control "public, max-age=31536000, immutable" always;
      try_files $uri =404;
    }

    # ----------------------------
    # Protect HTML (app shell) with Basic Auth
    # ----------------------------

    # Protect the root (and any HTML)
    location = / {
      auth_basic "CE Tracker – Authorized Users Only";
      auth_basic_user_file /etc/nginx/.htpasswd;

      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      try_files /index.html =404;
    }

    location = /index.html {
      auth_basic "CE Tracker – Authorized Users Only";
      auth_basic_user_file /etc/nginx/.htpasswd;

      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      try_files $uri =404;
    }

    # If someone requests other .html files, protect them too
    location ~* \.html$ {
      auth_basic "CE Tracker – Authorized Users Only";
      auth_basic_user_file /etc/nginx/.htpasswd;

      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      try_files $uri =404;
    }

    # ----------------------------
    # Helpful endpoints
    # ----------------------------

    # Force re-auth (\"logout\" for basic auth)
    location = /logout {
      add_header WWW-Authenticate 'Basic realm="CE Tracker – Logged Out"' always;
      return 401;
    }

    # Health endpoint for easy verification
    location = /health {
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # ----------------------------
    # Default fallback (optional)
    # ----------------------------

    location / {
      # Static file serving fallback
      try_files $uri $uri/ =404;
    }
  }
}
