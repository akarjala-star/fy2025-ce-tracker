
events {}

http {
  # ✅ Critical: fixes CSS/JS formatting issues
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ✅ Global Basic Auth
    auth_basic "CE Tracker – Authorized Users Only";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # ✅ Default route (serves your app)
    location / {
      try_files $uri $uri/ =404;
    }

    # ✅ Logout endpoint (forces re-auth)
    location = /logout {
      add_header WWW-Authenticate 'Basic realm="CE Tracker – Logged Out"' always;
      return 401;
    }

    # ✅ Health check endpoint (good for Railway)
    location = /health {
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # ✅ Prevent caching of index.html (ensures UI updates immediately)
    location = /index.html {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      try_files $uri =404;
    }

    # ✅ Cache static assets aggressively (faster performance)
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
      add_header Cache-Control "public, max-age=31536000, immutable" always;
      try_files $uri =404;
    }
  }
}
